# Docker
# Build and push an image to Azure Container Registry
# https://docs.microsoft.com/azure/devops/pipelines/languages/docker

trigger:
- main

resources:
- repo: self

variables:
  # Container registry service connection established during pipeline creation
  dockerRegistryServiceConnection: '0edb5a11-5461-46da-89e0-f20d02bed2c8'
  imageRepository: 'todoapp'
  containerRegistry: 'simpleregistry.azurecr.io'
  dockerfilePath: '$(Build.SourcesDirectory)/dockerfile'
  tag: '$(Build.BuildId)'

  # Agent VM image name
  vmImageName: 'self-hosted'

stages:
- stage: Build
  displayName: Build and push stage
  jobs:
  - job: Build
    displayName: Build
    pool:
      name: $(vmImageName)
    steps:
    - task: Docker@2
      displayName: Build and push an image to container registry
      inputs:
        command: buildAndPush
        repository: $(imageRepository)
        dockerfile: $(dockerfilePath)
        containerRegistry: $(dockerRegistryServiceConnection)
        tags: |
          $(tag)

    - task: AzureCLI@2
      inputs:
        azureSubscription: 'Azure subscription 1 (281d6df1-9dfc-46bb-a0e9-46971c2d4d33)'
        scriptType: 'bash'
        scriptLocation: 'inlineScript'
        inlineScript: |
          az acr login --name simpleregistry
          az container delete --name todoapp --resource-group Devops-RG --yes || true
          az container create \
            --name todoapp \
            --resource-group Devops-RG \
            --image $(containerRegistry)/$(imageRepository):$(tag) \
            --dns-name-label aci-demo-bala \
            --ports 80 \
            --os-type Linux
    
